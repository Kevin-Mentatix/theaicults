<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — The AI Cults</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400;1,9..144,600&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="icon" href="/assets/img/sigil.svg" type="image/svg+xml">
<style>
  .nf { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 40px var(--gutter); position: relative; overflow: hidden; }
  .nf__geo { position: absolute; top: 50%; left: 50%; width: min(110vh, 900px); height: min(110vh, 900px); transform: translate(-50%,-50%); opacity: 0.18; pointer-events: none; }
  .nf__geo * { stroke: var(--gold); fill: none; }
  .nf__inner { position: relative; z-index: 2; max-width: 620px; }
  .nf .sigil { width: 52px; height: 52px; margin: 0 auto 26px; }
  .nf h1 { font-size: clamp(3.5rem, 12vw, 7rem); color: var(--gold); line-height: 1; }
  .nf p { color: var(--paper-2); margin: 18px 0 32px; font-size: 1.1rem; }
  .nf a { font-family: var(--mono); font-size: 0.74rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink); background: var(--gold); padding: 14px 24px; display: inline-block; transition: opacity .2s; }
  .nf a:hover { opacity: 0.85; }
</style>
</head>
<body>
<main class="nf">
  <svg class="nf__geo" viewBox="0 0 400 400" aria-hidden="true">
    <circle cx="200" cy="200" r="180" stroke-width="1"/>
    <circle cx="200" cy="200" r="120" stroke-width="1"/>
    <polygon points="200,40 340,300 60,300" stroke-width="1"/>
    <circle cx="200" cy="200" r="34" stroke-width="1.4"/>
  </svg>
  <div class="nf__inner">
    <svg class="sigil" viewBox="0 0 100 100" aria-hidden="true">
      <polygon points="50,8 92,86 8,86" fill="none" stroke="#c8a34e" stroke-width="3"/>
      <circle cx="50" cy="60" r="13" fill="none" stroke="#c8a34e" stroke-width="3"/>
      <circle cx="50" cy="60" r="4" fill="#c8a34e"/>
      <line x1="50" y1="8" x2="50" y2="47" stroke="#c8a34e" stroke-width="3"/>
    </svg>
    <h1>404</h1>
    <p>This page has been lost to the noosphere. The signal didn't converge.</p>
    <a href="/index.html">← Return to The AI Cults</a>
  </div>
</main>
</body>
</html>
